name: CI/CD

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

env:
    REGISTRY: ghcr.io
    API_IMAGE: ghcr.io/${{ github.repository_owner }}/clipper-api
    PLATFORM_IMAGE: ghcr.io/${{ github.repository_owner }}/clipper-platform

jobs:
    pr-check:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.22.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Dependencies
              run: pnpm install

            - name: Lint
              run: pnpm lint

            - name: Type Check
              run: pnpm --filter api exec tsc --noEmit

    deploy:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.22.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install Dependencies
              run: pnpm install

            - name: Lint
              run: pnpm lint

            - name: Type Check
              run: pnpm --filter api exec tsc --noEmit

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build & Push API image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: apps/api/Dockerfile
                  push: true
                  tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}

            - name: Build & Push Platform image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: apps/platform/Dockerfile
                  push: true
                  tags: ${{ env.PLATFORM_IMAGE }}:latest,${{ env.PLATFORM_IMAGE }}:${{ github.sha }}
                  build-args: |
                      VITE_API_URL=https://clipper.moni.id

            - name: Deploy to VPS
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT }}
                  script: |
                      cd /opt/clipper

                      # Pull latest images
                      docker compose -f docker-compose.prod.yml pull api platform

                      # Run Prisma migrations before restarting API
                      docker compose -f docker-compose.prod.yml run --rm --no-deps api \
                        sh -c "cd /app && node_modules/.bin/prisma migrate deploy --schema apps/api/prisma/schema.prisma"

                      # Restart all services
                      docker compose -f docker-compose.prod.yml up -d --remove-orphans
